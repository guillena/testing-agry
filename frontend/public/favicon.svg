<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 100 100" fill="none">
  <!-- Dots on top -->
  <circle cx="32" cy="12" r="9" fill="#fcd965" />
  <circle cx="68" cy="12" r="9" fill="#70d4d8" />
  
  <!-- Left Side + Bottom (Black) -->
  <path d="M25 30V80C25 91 33 100 45 100H55V80H45C42 80 40 78 40 75V30H25Z" fill="black" />
  
  <!-- Right Side Stripes -->
  <path d="M60 30V100H75V30H60Z" fill="white" clip-path="url(#stripesClip)" />
  
  <!-- Stripe 1: Yellow -->
  <path d="M50 30 L65 30 L20 100 L5 100 Z" fill="#fcd965" transform="translate(10, 0)" />
  <!-- Stripe 2: Cyan -->
  <path d="M50 30 L65 30 L20 100 L5 100 Z" fill="#70d4d8" transform="translate(25, 0)" />
  <!-- Stripe 3: Salmon -->
  <path d="M50 30 L65 30 L20 100 L5 100 Z" fill="#ee8a7f" transform="translate(40, 0)" />

  <!-- Clip the stripes to the U shape -->
  <mask id="uMask">
    <path d="M25 30V80C25 91 33 100 45 100H55V80H45C42 80 40 78 40 75V30H25Z" fill="white" />
    <path d="M60 30V80C60 91 68 100 80 100C92 100 100 91 100 80V30H85V80C85 83 83 85 80 85C77 85 75 83 75 80V30H60Z" fill="white" />
  </mask>

  <!-- Final composed U with stripes -->
  <g mask="url(#uMask)">
    <rect width="100" height="100" fill="black" />
    <!-- Yellow stripe slant -->
    <path d="M30 30 L55 30 L10 100 L-15 100 Z" fill="#fcd965" transform="translate(15, 0)" />
    <!-- Cyan stripe slant -->
    <path d="M30 30 L55 30 L10 100 L-15 100 Z" fill="#70d4d8" transform="translate(35, 0)" />
    <!-- Salmon stripe slant -->
    <path d="M30 30 L55 30 L10 100 L-15 100 Z" fill="#ee8a7f" transform="translate(55, 0)" />
  </g>
</svg>